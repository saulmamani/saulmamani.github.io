<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Valida Bs." />
  <meta name="description" content="Verifica si un billete boliviano de la Serie B tiene valor legal" />
  <title>Verificador de Billetes — Bolivia</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f8;
      --muted: rgba(240,240,248,0.45);
      --header-bg: rgba(26,26,46,0.92);
      --info-chip-bg: rgba(255,255,255,0.04);
      --serial-display-bg: rgba(255,255,255,0.06);
      --alert-card-bg: #1a1a2e;
      --bs10: #4fc3f7; --bs10-dark: #0277bd; --bs10-glow: rgba(79,195,247,0.25);
      --bs20: #ef9a9a; --bs20-dark: #c62828; --bs20-glow: rgba(239,154,154,0.25);
      --bs50: #ce93d8; --bs50-dark: #7b1fa2; --bs50-glow: rgba(206,147,216,0.25);
      --valid: #00e676; --invalid: #ff1744;
    }
    body.light {
      --bg: #f4f6fb; --surface: #ffffff; --border: rgba(0,0,0,0.1);
      --text: #111122; --muted: rgba(17,17,34,0.45);
      --header-bg: rgba(255,255,255,0.95);
      --info-chip-bg: rgba(0,0,0,0.04);
      --serial-display-bg: rgba(0,0,0,0.05);
      --alert-card-bg: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(79,195,247,.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(206,147,216,.06) 0%, transparent 50%);
      transition: background-color .3s, color .3s;
    }

    /* ── Header ── */
    header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background .3s, border-color .3s;
    }

    /* Top bar: theme toggle aligned right */
    .header-topbar {
      display: flex;
      justify-content: flex-end;
      padding: 10px 16px 0;
    }

    .theme-toggle {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      transition: all .2s;
      color: var(--text);
    }
    .theme-toggle:hover { opacity: .8; }

    /* Center block: shield + title */
    .header-center {
      text-align: center;
      padding: 8px 20px 18px;
    }
    .shield {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 13px;
      background: linear-gradient(135deg, #4fc3f7, #ce93d8);
      margin-bottom: 6px; font-size: 20px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem; font-weight: 800; letter-spacing: -.5px;
      color: var(--text);
    }
    header p { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* ── Install banner ── */
    .install-banner {
      display: none;
      width: 100%; max-width: 480px;
      margin: 16px 20px 0;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(79,195,247,.12), rgba(206,147,216,.12));
      border: 1.5px solid rgba(79,195,247,.3);
      border-radius: 14px;
      align-items: center;
      gap: 12px;
    }
    .install-banner.visible { display: flex; }
    .install-banner-text { flex: 1; font-size: .82rem; color: var(--text); line-height: 1.4; }
    .install-banner-text strong { font-family: 'Syne', sans-serif; font-size: .85rem; }
    .btn-install {
      background: linear-gradient(135deg, #4fc3f7, #ce93d8);
      border: none; border-radius: 10px;
      padding: 10px 16px;
      font-family: 'Syne', sans-serif; font-size: .82rem; font-weight: 700;
      color: #0f0f1a; cursor: pointer; white-space: nowrap;
      transition: opacity .2s;
    }
    .btn-install:active { opacity: .8; }
    .btn-install-close {
      background: transparent; border: none;
      color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 4px;
    }

    /* ── Main ── */
    main { width: 100%; max-width: 480px; padding: 24px 20px; flex: 1; }

    .step-label {
      font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .denom-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px; }
    .denom-btn {
      border-radius: 16px; padding: 18px 8px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: all .25s ease;
      background: var(--surface); border: 1.5px solid var(--border);
      position: relative; overflow: hidden;
    }
    .denom-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .25s; }
    .denom-btn.bs10::before { background: radial-gradient(circle at center, var(--bs10-glow), transparent 70%); }
    .denom-btn.bs20::before { background: radial-gradient(circle at center, var(--bs20-glow), transparent 70%); }
    .denom-btn.bs50::before { background: radial-gradient(circle at center, var(--bs50-glow), transparent 70%); }
    .denom-btn:hover::before, .denom-btn.active::before { opacity: 1; }
    .denom-btn.active.bs10 { border-color: var(--bs10); box-shadow: 0 0 20px var(--bs10-glow); }
    .denom-btn.active.bs20 { border-color: var(--bs20); box-shadow: 0 0 20px var(--bs20-glow); }
    .denom-btn.active.bs50 { border-color: var(--bs50); box-shadow: 0 0 20px var(--bs50-glow); }
    .denom-icon { font-size: 2rem; line-height: 1; }
    .denom-label { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; }
    .bs10 .denom-label { color: var(--bs10); }
    .bs20 .denom-label { color: var(--bs20); }
    .bs50 .denom-label { color: var(--bs50); }
    .denom-sub { font-size: .64rem; color: var(--muted); font-weight: 500; }

    .serial-section { animation: fadeUp .3s ease; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .bill-preview { height: 6px; border-radius: 3px; margin-bottom: 20px; transition: all .3s; }
    .bill-preview.bs10 { background: linear-gradient(90deg, var(--bs10-dark), var(--bs10)); box-shadow: 0 2px 12px var(--bs10-glow); }
    .bill-preview.bs20 { background: linear-gradient(90deg, var(--bs20-dark), var(--bs20)); box-shadow: 0 2px 12px var(--bs20-glow); }
    .bill-preview.bs50 { background: linear-gradient(90deg, var(--bs50-dark), var(--bs50)); box-shadow: 0 2px 12px var(--bs50-glow); }

    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap label {
      font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 10px;
    }
    .serial-input {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px 20px;
      font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700;
      letter-spacing: 3px; color: var(--text);
      transition: border-color .2s, box-shadow .2s, background .3s, color .3s;
      text-align: center;
    }
    .serial-input::placeholder { color: var(--muted); letter-spacing: 2px; font-size: 1rem; }
    .serial-input:focus { outline: none; }
    .serial-input.focus-bs10 { border-color: var(--bs10); box-shadow: 0 0 16px var(--bs10-glow); }
    .serial-input.focus-bs20 { border-color: var(--bs20); box-shadow: 0 0 16px var(--bs20-glow); }
    .serial-input.focus-bs50 { border-color: var(--bs50); box-shadow: 0 0 16px var(--bs50-glow); }

    .btn-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
    .btn-check-main {
      border: none; border-radius: 14px; padding: 16px 24px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
      letter-spacing: .5px; cursor: pointer; transition: all .2s; color: #0f0f1a;
    }
    .btn-check-main.bs10 { background: var(--bs10); }
    .btn-check-main.bs20 { background: var(--bs20); }
    .btn-check-main.bs50 { background: var(--bs50); }
    .btn-check-main:active { transform: scale(.97); }

    .btn-reset {
      border: 1.5px solid var(--border); background: transparent;
      border-radius: 14px; padding: 16px 18px;
      color: var(--muted); font-size: 1.2rem; cursor: pointer; transition: all .2s;
    }
    .btn-reset:hover { opacity: .75; }
    .btn-reset:active { transform: scale(.95); }

    .info-chip {
      margin-top: 28px; padding: 14px 18px; border-radius: 12px;
      background: var(--info-chip-bg); border: 1px solid var(--border);
      font-size: .78rem; color: var(--muted); line-height: 1.6; text-align: center;
      transition: background .3s, border-color .3s;
    }
    .info-chip strong { color: var(--text); opacity: .75; }

    /* ── Alert overlay ── */
    .alert-overlay {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; background: rgba(10,10,20,.85);
      backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .alert-overlay.show { opacity: 1; pointer-events: all; }
    .alert-card {
      background: var(--alert-card-bg); border-radius: 24px;
      padding: 36px 28px 28px; text-align: center;
      max-width: 320px; width: 100%;
      transform: scale(.85);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), background .3s;
      border: 1.5px solid var(--border);
    }
    .alert-overlay.show .alert-card { transform: scale(1); }
    .alert-icon {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto 20px;
    }
    .alert-icon.valid   { background: rgba(0,230,118,.15); border: 2px solid var(--valid); color: var(--valid); }
    .alert-icon.invalid { background: rgba(255,23,68,.15);  border: 2px solid var(--invalid); color: var(--invalid); }
    .alert-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    .alert-title.valid   { color: var(--valid); }
    .alert-title.invalid { color: var(--invalid); }
    .alert-sub { font-size: .85rem; color: var(--muted); line-height: 1.5; margin-bottom: 24px; }
    .alert-serial-display {
      font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700;
      letter-spacing: 2px; padding: 8px 16px; border-radius: 8px;
      background: var(--serial-display-bg); margin-bottom: 20px; color: var(--muted);
    }
    .btn-close-alert {
      width: 100%; border: none; border-radius: 12px; padding: 14px;
      font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s; color: #0f0f1a;
    }
    .btn-close-alert.valid   { background: var(--valid); }
    .btn-close-alert.invalid { background: var(--invalid); }
    .btn-close-alert:active { opacity: .85; }

    @keyframes pulse-ring {
      0%   { transform: scale(.9); opacity: 1; }
      80%  { transform: scale(1.3); opacity: 0; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    .pulse-wrap { position: relative; display: inline-block; }
    .pulse-wrap::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid currentColor;
      animation: pulse-ring 1.4s ease-out infinite;
    }

    footer {
      width: 100%; text-align: center;
      padding: 16px;
      font-size: .72rem; color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <!-- Theme toggle in its own top row, no overlapping -->
    <div class="header-topbar">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">☀️</button>
    </div>
    <!-- Centered title block -->
    <div class="header-center">
      <div class="shield">🛡️</div>
      <h1>Verificador de Billetes</h1>
      <p>Serie B · Banco Central de Bolivia</p>
    </div>
  </header>

  <!-- Install to home screen banner -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-text">
      <strong>📲 Instalar App</strong><br>
      Agrégala a tu pantalla de inicio para usarla sin internet.
    </div>
    <button class="btn-install" id="btnInstall" onclick="installApp()">Instalar</button>
    <button class="btn-install-close" onclick="dismissInstall()">✕</button>
  </div>

  <main>
    <div class="step-label">① Seleccione el corte</div>
    <div class="denom-grid">
      <button class="denom-btn bs10" onclick="selectDenom(10)">
        <span class="denom-icon">💵</span>
        <span class="denom-label">Bs. 10</span>
        <span class="denom-sub">Azul</span>
      </button>
      <button class="denom-btn bs20" onclick="selectDenom(20)">
        <span class="denom-icon">💵</span>
        <span class="denom-label">Bs. 20</span>
        <span class="denom-sub">Rojo</span>
      </button>
      <button class="denom-btn bs50" onclick="selectDenom(50)">
        <span class="denom-icon">💵</span>
        <span class="denom-label">Bs. 50</span>
        <span class="denom-sub">Morado</span>
      </button>
    </div>

    <div class="serial-section" id="serialSection" style="display:none">
      <div class="bill-preview" id="billPreview"></div>
      <div class="input-wrap">
        <label for="serialInput">② Ingrese el número de serie</label>
        <input type="number" id="serialInput" class="serial-input"
          placeholder="Ej: 87500000" inputmode="numeric" autocomplete="off" />
      </div>
      <div class="btn-row">
        <button class="btn-check-main" id="btnCheck" onclick="verificar()">🔍 Verificar</button>
        <button class="btn-reset" onclick="resetAll()" title="Reiniciar">↺</button>
      </div>
      <div class="info-chip">
        Ingrese el número completo sin espacios ni letras.<br>
        <strong>Solo números de la Serie B son verificables.</strong>
      </div>
    </div>
  </main>

    <!-- Footer -->
  <footer>
    <a href="https://saulmamani.github.io/" target="_blank" rel="noopener noreferrer">Saul Mamani M.</a>
    <span class="year" id="footerYear"></span>
  </footer>

  <!-- Alert overlay -->
  <div class="alert-overlay" id="alertOverlay" onclick="closeAlert()">
    <div class="alert-card" onclick="event.stopPropagation()">
      <div class="alert-icon pulse-wrap" id="alertIcon"></div>
      <div class="alert-title" id="alertTitle"></div>
      <div class="alert-serial-display" id="alertSerial"></div>
      <p class="alert-sub" id="alertSub"></p>
      <button class="btn-close-alert" id="alertBtn" onclick="closeAlert()">Entendido</button>
    </div>
  </div>

  <script>
    // ── Ranges (Serie B sin valor legal) ──
    const RANGES = {
      50: [[67250001,67700000],[69050001,69500000],[69500001,69950000],[69950001,70400000],
           [70400001,70850000],[70850001,71300000],[76310012,85139995],[86400001,86850000],
           [90900001,91350000],[91800001,92250000]],
      20: [[87280145,91646549],[96650001,97100000],[99800001,100250000],[100250001,100700000],
           [109250001,109700000],[110600001,111050000],[111050001,111500000],[111950001,112400000],
           [112400001,112850000],[112850001,113300000],[114200001,114650000],[114650001,115100000],
           [115100001,115550000],[118700001,119150000],[119150001,119600000],[120500001,120950000]],
      10: [[77100001,77550000],[78000001,78450000],[78900001,96350000],[96350001,96800000],
           [96800001,97250000],[98150001,98600000],[104900001,105350000],[105350001,105800000],
           [106700001,107150000],[107600001,108050000],[108050001,108500000],[109400001,109850000]]
    };

    let selectedDenom = null;
    let deferredPrompt = null;

    // ── PWA Install prompt ──
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').classList.add('visible');
    });

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').classList.remove('visible');
      deferredPrompt = null;
    });

    async function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('installBanner').classList.remove('visible');
      }
      deferredPrompt = null;
    }

    function dismissInstall() {
      document.getElementById('installBanner').classList.remove('visible');
    }

    // ── Theme ──
    let isLight = false;
    function toggleTheme() {
      isLight = !isLight;
      document.body.classList.toggle('light', isLight);
      document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
    }

    // ── Denomination selector ──
    function selectDenom(denom) {
      selectedDenom = denom;
      document.querySelectorAll('.denom-btn').forEach(b => b.classList.remove('active'));
      const map = { 10:'bs10', 20:'bs20', 50:'bs50' };
      document.querySelector('.denom-btn.' + map[denom]).classList.add('active');
      document.getElementById('serialInput').className = 'serial-input focus-' + map[denom];
      document.getElementById('btnCheck').className = 'btn-check-main ' + map[denom];
      document.getElementById('billPreview').className = 'bill-preview ' + map[denom];
      const section = document.getElementById('serialSection');
      section.style.display = 'block';
      section.style.animation = 'none';
      requestAnimationFrame(() => { section.style.animation = ''; });
      document.getElementById('serialInput').value = '';
      document.getElementById('serialInput').focus();
    }

    function isInvalidSerial(denom, serial) {
      for (const [from, to] of RANGES[denom]) {
        if (serial >= from && serial <= to) return true;
      }
      return false;
    }

    function verificar() {
      if (!selectedDenom) return;
      const raw = document.getElementById('serialInput').value.trim();
      if (!raw) { shakeInput(); return; }
      const serial = parseInt(raw, 10);
      if (isNaN(serial) || serial <= 0) { shakeInput(); return; }
      showAlert(isInvalidSerial(selectedDenom, serial), serial);
    }

    function shakeInput() {
      const input = document.getElementById('serialInput');
      input.style.borderColor = '#ff1744';
      setTimeout(() => { input.style.borderColor = ''; }, 1000);
    }

    function showAlert(isObserved, serial) {
      const icon  = document.getElementById('alertIcon');
      const title = document.getElementById('alertTitle');
      const sub   = document.getElementById('alertSub');
      const btn   = document.getElementById('alertBtn');
      document.getElementById('alertSerial').textContent = 'Serie: ' + serial + '  ·  Bs. ' + selectedDenom;
      if (isObserved) {
        icon.textContent = '✗'; icon.className = 'alert-icon pulse-wrap invalid';
        title.textContent = 'Billete Observado'; title.className = 'alert-title invalid';
        sub.textContent = '⚠️ No lo reciba. Este billete pertenece a los rangos de la Serie B sin valor legal según el Banco Central de Bolivia.';
        btn.className = 'btn-close-alert invalid';
      } else {
        icon.textContent = '✓'; icon.className = 'alert-icon pulse-wrap valid';
        title.textContent = 'Billete Válido'; title.className = 'alert-title valid';
        sub.textContent = '✅ Este número de serie no se encuentra en los rangos de billetes observados. El billete puede aceptarse con normalidad.';
        btn.className = 'btn-close-alert valid';
      }
      document.getElementById('alertOverlay').classList.add('show');
    }

    function closeAlert() { document.getElementById('alertOverlay').classList.remove('show'); }

    function resetAll() {
      selectedDenom = null;
      document.querySelectorAll('.denom-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('serialInput').value = '';
      document.getElementById('serialSection').style.display = 'none';
      closeAlert();
    }

    document.getElementById('serialInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') verificar();
    });

    // ── Service Worker ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW error:', err));
    }
  </script>
</body>
</html>
