<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Verifica tu Billete" />
  <meta name="description" content="Verifica si tu billete boliviano de la Serie B tiene valor legal" />
  <title>Verifica tu Billete</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ══ THEMES ══ */
    [data-theme="dark"] {
      --bg:         #0f0f1a;
      --surface:    #1a1a2e;
      --border:     rgba(255,255,255,0.09);
      --text:       #f0f0f8;
      --muted:      rgba(240,240,248,0.45);
      --header-bg:  rgba(15,15,26,0.92);
      --info-bg:    rgba(255,255,255,0.04);
      --serial-bg:  rgba(255,255,255,0.06);
      --overlay-bg: rgba(5,5,15,0.88);
      --card-bg:    #1a1a2e;
      --input-bg:   #111124;
      --input-text: #f0f0f8;
      --grad1: rgba(79,195,247,0.07);
      --grad2: rgba(206,147,216,0.07);
    }
    [data-theme="light"] {
      --bg:         #f0f4fb;
      --surface:    #ffffff;
      --border:     rgba(0,0,0,0.10);
      --text:       #12122a;
      --muted:      rgba(18,18,42,0.48);
      --header-bg:  rgba(255,255,255,0.93);
      --info-bg:    rgba(0,0,0,0.04);
      --serial-bg:  rgba(0,0,0,0.05);
      --overlay-bg: rgba(150,160,190,0.80);
      --card-bg:    #ffffff;
      --input-bg:   #f7f8ff;
      --input-text: #12122a;
      --grad1: rgba(79,195,247,0.10);
      --grad2: rgba(206,147,216,0.10);
    }

    :root {
      --bs10: #4fc3f7; --bs10-dk: #0277bd; --bs10-gl: rgba(79,195,247,0.22);
      --bs20: #ef9a9a; --bs20-dk: #c62828; --bs20-gl: rgba(239,154,154,0.22);
      --bs50: #ce93d8; --bs50-dk: #7b1fa2; --bs50-gl: rgba(206,147,216,0.22);
      --ok:  #00c853;
      --bad: #ff1744;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image:
        radial-gradient(ellipse at 15% 5%,  var(--grad1) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, var(--grad2) 0%, transparent 55%);
      transition: background-color .3s, color .3s;
    }

    /* ══ HEADER ══ */
    header {
      width: 100%;
      padding: 22px 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 20;
      transition: background .3s;
      position: relative;
    }
    .shield {
      width: 46px; height: 46px;
      border-radius: 13px;
      background: linear-gradient(135deg, #4fc3f7, #ce93d8);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.1rem, 5vw, 1.35rem);
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--text);
    }
    header p { font-size: clamp(.68rem, 3vw, .78rem); color: var(--muted); margin-top: 2px; }

    .theme-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: var(--info-bg);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 7px 12px;
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; color: var(--muted);
      font-size: .7rem; font-family: 'Syne', sans-serif; font-weight: 700;
      transition: all .2s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--bs50); }

    /* ══ MAIN ══ */
    main { width: 100%; max-width: 460px; padding: 24px 16px 12px; flex: 1; }

    .step-label {
      font-family: 'Syne', sans-serif;
      font-size: .68rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }

    /* ══ DENOM BUTTONS ══ */
    .denom-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; margin-bottom: 26px;
    }
    .denom-btn {
      border-radius: 16px; padding: 16px 6px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; background: var(--surface);
      border: 1.5px solid var(--border);
      position: relative; overflow: hidden;
      transition: border-color .25s, box-shadow .25s, background .3s;
      -webkit-tap-highlight-color: transparent;
    }
    .denom-btn::before {
      content: ''; position: absolute; inset: 0;
      opacity: 0; transition: opacity .25s; pointer-events: none;
    }
    .denom-btn.bs10::before { background: radial-gradient(circle at center, var(--bs10-gl), transparent 70%); }
    .denom-btn.bs20::before { background: radial-gradient(circle at center, var(--bs20-gl), transparent 70%); }
    .denom-btn.bs50::before { background: radial-gradient(circle at center, var(--bs50-gl), transparent 70%); }
    .denom-btn:hover::before, .denom-btn.active::before { opacity: 1; }
    .denom-btn.active.bs10 { border-color: var(--bs10); box-shadow: 0 0 18px var(--bs10-gl); }
    .denom-btn.active.bs20 { border-color: var(--bs20); box-shadow: 0 0 18px var(--bs20-gl); }
    .denom-btn.active.bs50 { border-color: var(--bs50); box-shadow: 0 0 18px var(--bs50-gl); }
    .denom-icon { font-size: 1.9rem; line-height: 1; }
    .denom-label { font-family: 'Syne', sans-serif; font-size: clamp(.82rem,4vw,1rem); font-weight: 800; }
    .bs10 .denom-label { color: var(--bs10); }
    .bs20 .denom-label { color: var(--bs20); }
    .bs50 .denom-label { color: var(--bs50); }

    /* ══ SERIAL SECTION ══ */
    .serial-section { animation: fadeUp .3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .color-bar {
      height: 5px; border-radius: 3px; margin-bottom: 18px; transition: all .3s;
    }
    .color-bar.bs10 { background: linear-gradient(90deg,var(--bs10-dk),var(--bs10)); box-shadow: 0 2px 10px var(--bs10-gl); }
    .color-bar.bs20 { background: linear-gradient(90deg,var(--bs20-dk),var(--bs20)); box-shadow: 0 2px 10px var(--bs20-gl); }
    .color-bar.bs50 { background: linear-gradient(90deg,var(--bs50-dk),var(--bs50)); box-shadow: 0 2px 10px var(--bs50-gl); }

    .field-label {
      font-family: 'Syne', sans-serif;
      font-size: .68rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 10px;
    }

    /* ══ INPUT — mobile-safe (font-size >= 16px prevents iOS zoom) ══ */
    .serial-input {
      display: block;
      width: 100%;
      font-size: 20px;           /* ≥16px → no zoom on iOS */
      line-height: 1.4;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 4px;
      text-align: center;
      color: var(--input-text);
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 15px 16px;
      margin-bottom: 14px;
      /* Remove native styling */
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: textfield;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .3s, color .3s;
    }
    .serial-input::-webkit-outer-spin-button,
    .serial-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .serial-input::placeholder {
      color: var(--muted); letter-spacing: 2px;
      font-size: 14px; font-weight: 400;
    }
    .serial-input.t-bs10 { border-color: var(--bs10); box-shadow: 0 0 14px var(--bs10-gl); }
    .serial-input.t-bs20 { border-color: var(--bs20); box-shadow: 0 0 14px var(--bs20-gl); }
    .serial-input.t-bs50 { border-color: var(--bs50); box-shadow: 0 0 14px var(--bs50-gl); }
    .serial-input.error  { border-color: var(--bad) !important; box-shadow: 0 0 12px rgba(255,23,68,.3) !important; }

    /* ══ BUTTONS ══ */
    .btn-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .btn-verify {
      border: none; border-radius: 14px; padding: 15px 20px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; color: #0a0a1a;
      transition: transform .15s, opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-verify.bs10 { background: var(--bs10); }
    .btn-verify.bs20 { background: var(--bs20); }
    .btn-verify.bs50 { background: var(--bs50); }
    .btn-verify:active { transform: scale(.97); opacity: .88; }

    .btn-reset {
      border: 1.5px solid var(--border); background: transparent;
      border-radius: 14px; padding: 15px 18px;
      font-size: 1.15rem; color: var(--muted);
      cursor: pointer; transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset:hover { border-color: var(--bad); color: var(--bad); }
    .btn-reset:active { transform: scale(.95); }

    .info-chip {
      margin-top: 18px; padding: 12px 16px;
      border-radius: 12px;
      background: var(--info-bg); border: 1px solid var(--border);
      font-size: .78rem; color: var(--muted);
      line-height: 1.6; text-align: center; transition: background .3s;
    }
    .info-chip strong { color: var(--text); opacity: .75; }

    /* ══ ALERT OVERLAY ══ */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      background: var(--overlay-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .alert-card {
      background: var(--card-bg); border-radius: 24px; padding: 32px 24px 24px;
      text-align: center; max-width: 310px; width: 100%;
      border: 1.5px solid var(--border);
      transform: scale(.85);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), background .3s;
    }
    .overlay.show .alert-card { transform: scale(1); }
    .alert-icon {
      width: 76px; height: 76px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin-bottom: 18px; position: relative;
    }
    .alert-icon.ok  { background: rgba(0,200,83,.12);  border: 2px solid var(--ok);  color: var(--ok); }
    .alert-icon.bad { background: rgba(255,23,68,.12); border: 2px solid var(--bad); color: var(--bad); }
    @keyframes pulse-ring {
      0%  { transform: scale(.88); opacity: 1; }
      80% { transform: scale(1.28); opacity: 0; }
      100%{ transform: scale(1.28); opacity: 0; }
    }
    .alert-icon::after {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      border: 2px solid currentColor;
      animation: pulse-ring 1.5s ease-out infinite;
    }
    .alert-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; margin-bottom: 6px; }
    .alert-title.ok  { color: var(--ok); }
    .alert-title.bad { color: var(--bad); }
    .alert-serial {
      font-family: 'Syne', sans-serif; font-size: .82rem; font-weight: 700;
      letter-spacing: 2px; padding: 7px 14px; border-radius: 8px;
      background: var(--serial-bg); color: var(--muted);
      margin: 10px 0 14px; transition: background .3s;
    }
    .alert-msg { font-size: .83rem; color: var(--muted); line-height: 1.55; margin-bottom: 22px; }
    .btn-ok {
      width: 100%; border: none; border-radius: 12px; padding: 13px;
      font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 800;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-ok.ok  { background: var(--ok);  color: #03260e; }
    .btn-ok.bad { background: var(--bad); color: #fff; }
    .btn-ok:active { opacity: .85; }

    /* ══ FOOTER ══ */
    footer {
      width: 100%; max-width: 460px;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    footer a {
      font-family: 'Syne', sans-serif; font-size: .73rem; font-weight: 700;
      color: var(--bs50); text-decoration: none;
      letter-spacing: .3px; transition: opacity .2s;
    }
    footer a:hover { opacity: .7; text-decoration: underline; }
    .year { font-family: 'DM Sans', sans-serif; font-size: .73rem; color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <div class="shield">🛡️</div>
    <h1>Verifica tu Billete</h1>
    <p>Billetes de la Serie B de cortes 10, 20 y 50 Bs</p>
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Claro</span>
    </button>
  </header>

  <main>
    <div class="step-label">① Seleccione el corte</div>
    <div class="denom-grid">
      <button class="denom-btn bs10" onclick="selectDenom(10)">
        <span class="denom-icon">💵</span>
        <span class="denom-label">Bs. 10</span>
      </button>
      <button class="denom-btn bs20" onclick="selectDenom(20)">
        <span class="denom-icon">💵</span>
        <span class="denom-label">Bs. 20</span>
      </button>
      <button class="denom-btn bs50" onclick="selectDenom(50)">
        <span class="denom-icon">💵</span>
        <span class="denom-label">Bs. 50</span>
      </button>
    </div>

    <div id="serialSection" class="serial-section" style="display:none">
      <div class="color-bar" id="colorBar"></div>
      <label class="field-label" for="serialInput">② Número de serie del billete</label>
      <input
        type="tel"
        id="serialInput"
        class="serial-input"
        placeholder="Ej: 87500000"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <div class="btn-row">
        <button class="btn-verify" id="btnVerify" onclick="verificar()">🔍 Verificar</button>
        <button class="btn-reset" onclick="resetAll()" title="Reiniciar">↺</button>
      </div>
      <div class="info-chip">
        Ingrese el número completo sin espacios ni letras.<br>
        <strong>Solo billetes de la Serie B son verificables.</strong>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <a href="https://saulmamani.github.io/" target="_blank" rel="noopener noreferrer">Saul Mamani M.</a>
    <span class="year" id="footerYear"></span>
  </footer>

  <div class="overlay" id="overlay" onclick="closeAlert()">
    <div class="alert-card" onclick="event.stopPropagation()">
      <div class="alert-icon" id="aIcon"></div>
      <div class="alert-title" id="aTitle"></div>
      <div class="alert-serial" id="aSerial"></div>
      <p class="alert-msg" id="aMsg"></p>
      <button class="btn-ok" id="aBtn" onclick="closeAlert()">Entendido</button>
    </div>
  </div>

  <script>
    /* ── Data ── */
    const RANGES = {
      50: [
        [67250001,67700000],[69050001,69500000],[69500001,69950000],
        [69950001,70400000],[70400001,70850000],[70850001,71300000],
        [76310012,85139995],[86400001,86850000],[90900001,91350000],
        [91800001,92250000]
      ],
      20: [
        [87280145,91646549],[96650001,97100000],[99800001,100250000],
        [100250001,100700000],[109250001,109700000],[110600001,111050000],
        [111050001,111500000],[111950001,112400000],[112400001,112850000],
        [112850001,113300000],[114200001,114650000],[114650001,115100000],
        [115100001,115550000],[118700001,119150000],[119150001,119600000],
        [120500001,120950000]
      ],
      10: [
        [77100001,77550000],[78000001,78450000],[78900001,96350000],
        [96350001,96800000],[96800001,97250000],[98150001,98600000],
        [104900001,105350000],[105350001,105800000],[106700001,107150000],
        [107600001,108050000],[108050001,108500000],[109400001,109850000]
      ]
    };
    const CLS = {10:'bs10', 20:'bs20', 50:'bs50'};
    let denom = null;

    /* ── Footer year ── */
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    /* ── Theme ── */
    let dark = true;
    function toggleTheme() {
      dark = !dark;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('themeIcon').textContent  = dark ? '☀️' : '🌙';
      document.getElementById('themeLabel').textContent = dark ? 'Claro' : 'Oscuro';
    }

    /* ── Select denomination ── */
    function selectDenom(d) {
      denom = d;
      document.querySelectorAll('.denom-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.denom-btn.' + CLS[d]).classList.add('active');

      const input = document.getElementById('serialInput');
      input.className = 'serial-input t-' + CLS[d];
      document.getElementById('btnVerify').className = 'btn-verify ' + CLS[d];
      document.getElementById('colorBar').className  = 'color-bar '  + CLS[d];

      const sec = document.getElementById('serialSection');
      sec.style.display = 'block';
      sec.style.animation = 'none';
      requestAnimationFrame(() => { sec.style.animation = ''; });

      input.value = '';
      setTimeout(() => input.focus(), 150);
    }

    /* ── Verify ── */
    function verificar() {
      if (!denom) return;
      const input  = document.getElementById('serialInput');
      const raw    = input.value.replace(/\D/g, '').trim();
      if (!raw) { flashError(input); return; }
      const serial = parseInt(raw, 10);
      if (isNaN(serial) || serial <= 0) { flashError(input); return; }
      const observed = RANGES[denom].some(([a,b]) => serial >= a && serial <= b);
      showAlert(observed, serial);
    }

    function flashError(input) {
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 1200);
    }

    /* ── Alert ── */
    function showAlert(observed, serial) {
      const icon  = document.getElementById('aIcon');
      const title = document.getElementById('aTitle');
      const ser   = document.getElementById('aSerial');
      const msg   = document.getElementById('aMsg');
      const btn   = document.getElementById('aBtn');

      ser.textContent = 'Serie: ' + serial + '  ·  Bs. ' + denom;

      if (observed) {
        icon.textContent  = '✗'; icon.className   = 'alert-icon bad';
        title.textContent = 'Billete Observado'; title.className  = 'alert-title bad';
        msg.textContent   = '⚠️ No lo reciba. Este número pertenece a los rangos de la Serie B sin valor legal según el Banco Central de Bolivia.';
        btn.className     = 'btn-ok bad';
      } else {
        icon.textContent  = '✓'; icon.className   = 'alert-icon ok';
        title.textContent = 'Billete Válido'; title.className  = 'alert-title ok';
        msg.textContent   = '✅ Este número de serie no está en los rangos observados. El billete puede aceptarse con normalidad.';
        btn.className     = 'btn-ok ok';
      }
      document.getElementById('overlay').classList.add('show');
    }

    function closeAlert() { document.getElementById('overlay').classList.remove('show'); }

    function resetAll() {
      denom = null;
      document.querySelectorAll('.denom-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('serialInput').value = '';
      document.getElementById('serialSection').style.display = 'none';
      closeAlert();
    }

    /* Enter key & numeric-only */
    const inp = document.getElementById('serialInput');
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); verificar(); } });
    inp.addEventListener('input',   function() { this.value = this.value.replace(/\D/g, ''); });

    /* ══ PWA Service Worker ══ */
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'verifica-bs-v1';
        self.addEventListener('install', e => {
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
        });
        self.addEventListener('fetch', e => {
          e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }

    /* PWA Manifest */
    const manifest = {
      name: "Verifica tu Billete",
      short_name: "Verifica Bs",
      description: "Verificador de billetes bolivianos Serie B",
      start_url: ".",
      display: "standalone",
      background_color: "#0f0f1a",
      theme_color: "#1a1a2e"
    };
    const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const mLink = document.createElement('link');
    mLink.rel = 'manifest';
    mLink.href = URL.createObjectURL(mBlob);
    document.head.appendChild(mLink);
  </script>

</body>
</html>
