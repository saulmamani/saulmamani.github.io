<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TK1EFCZP8T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TK1EFCZP8T');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Valida Bs." />
  <meta name="description" content="Verifica si un billete boliviano de la Serie B tiene valor legal" />
  <title>Verificador de Billetes — Bolivia</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
</head>
<body>

  <header>
    <div class="header-topbar">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">☀️</button>
    </div>
    <div class="header-center">
      <div class="shield">💶</div>
      <h1>Verifica tus Billetes</h1>
    </div>
  </header>

  <!-- Install banner -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-text">
      <strong>📲 Instalar App</strong><br>
      Agrégala a tu pantalla de inicio para usarla sin internet.
    </div>
    <button class="btn-install" id="btnInstall" onclick="installApp()">Instalar</button>
    <button class="btn-install-close" onclick="dismissInstall()">✕</button>
  </div>

  <main>

    <!-- Step 1: denomination selector -->
    <div class="section-card">
      <span class="step-label">① Seleccione el corte del billete</span>
      <div class="denom-grid">
        <button class="denom-btn bs10" onclick="selectDenom(10, this)">
          <span class="denom-check">✓</span>
          <span class="denom-icon">💵</span>
          <span class="denom-label">Bs. 10</span>
        </button>
        <button class="denom-btn bs20" onclick="selectDenom(20, this)">
          <span class="denom-check">✓</span>
          <span class="denom-icon">💵</span>
          <span class="denom-label">Bs. 20</span>
        </button>
        <button class="denom-btn bs50" onclick="selectDenom(50, this)">
          <span class="denom-check">✓</span>
          <span class="denom-icon">💵</span>
          <span class="denom-label">Bs. 50</span>
        </button>
      </div>
    </div>

    <!-- Step 2: serial input (hidden until denom selected) -->
    <div class="section-card" id="serialCard" style="display:none">
      <div class="serial-section" id="serialSection">
        <div class="denom-bar" id="denomBar"></div>
        <label class="field-label" for="serialInput">② Ingrese o escanee el número de serie</label>
        <div class="input-wrapper">
          <input
            type="tel"
            id="serialInput"
            class="serial-input"
            placeholder="Ej: 87500000"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
          <button class="btn-camera" onclick="openCamera()" title="Abrir cámara para escanear" aria-label="Abrir cámara para escanear número de serie">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span class="soon-dot"></span>
          </button>
        </div>
        <div class="btn-row">
          <button class="btn-verify" id="btnVerify" onclick="verificar()">🔍 Verificar</button>
          <button class="btn-reset" onclick="resetAll()" title="Limpiar">↺</button>
        </div>
      </div>
    </div>

    <div class="info-chip">
      Solo billetes de la <strong>Serie B</strong> son verificables en esta herramienta.
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <a href="https://saulmamani.github.io/" target="_blank" rel="noopener noreferrer">&copy; Saul Mamani M.</a>
    <span class="year" id="footerYear"></span>
  </footer>

  <!-- Alert overlay -->
  <div class="alert-overlay" id="alertOverlay" onclick="closeAlert()">
    <div class="alert-card" onclick="event.stopPropagation()">
      <div class="alert-icon pulse-wrap" id="alertIcon"></div>
      <div class="alert-denom-badge" id="alertDenom"></div>
      <div class="alert-title" id="alertTitle"></div>
      <div class="alert-serial-display" id="alertSerial"></div>
      <p class="alert-sub" id="alertSub"></p>
      <button class="btn-close-alert" id="alertBtn" onclick="closeAlert()">Entendido</button>
    </div>
  </div>

  <!-- Camera overlay -->
  <div class="camera-overlay" id="cameraOverlay" onclick="closeCamera()">
    <div class="camera-container" onclick="event.stopPropagation()">
      <video id="cameraPreview" autoplay playsinline></video>
      <div class="camera-controls">
        <div id="ocrStatus">Detectando...</div>
        <button class="btn-close-camera" onclick="closeCamera()">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="scripts.js" defer></script>
</body>
</html>
